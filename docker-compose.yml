services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: taskapp
      POSTGRES_PASSWORD: taskapp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskapp -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: taskdb
      DB_USERNAME: taskapp
      DB_PASSWORD: taskapp
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data: